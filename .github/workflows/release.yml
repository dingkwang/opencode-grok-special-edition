name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
            archive: opencode-grok-linux-x64
          - runner: ubuntu-latest
            target: linux-x64-baseline
            archive: opencode-grok-linux-x64-baseline
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            archive: opencode-grok-linux-arm64
          - runner: macos-13
            target: darwin-x64
            archive: opencode-grok-darwin-x64
          - runner: macos-14
            target: darwin-arm64
            archive: opencode-grok-darwin-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binary
        run: bun run script/build.ts ${{ matrix.target }}

      - name: Archive artifact
        run: |
          mkdir -p release
          tar -C dist -czf "release/${{ matrix.archive }}.tar.gz" "${{ matrix.archive }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
